services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    environment:
      DJANGO_DEBUG:  "True"
      ALLOWED_HOSTS: "*"
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      HMAC_KEY:          ${HMAC_KEY}